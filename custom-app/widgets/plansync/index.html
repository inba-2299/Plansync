<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Plansync — Rocketlane Project Plan Agent</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <style>
      /*
       * Plansync Custom App widget shell
       *
       * This widget is loaded by Rocketlane's Custom Apps runtime when
       * a user opens Plansync from the workspace left nav or a project
       * tab. It does one job: full-viewport iframe to the live Vercel
       * deployment, with `?embed=1` appended so the frontend hides its
       * Plansync header (Rocketlane provides its own chrome).
       *
       * Why an iframe wrapper instead of bundling the full Next.js app:
       *  - Users get bug fixes and new features the moment we deploy
       *    to Vercel, with zero touch on the Custom App side
       *  - The Custom App .zip stays small (~350 KB after rli build)
       *  - Backend connectivity to Railway is a normal browser fetch,
       *    not something we need to proxy through Rocketlane's runtime
       *
       * Trade-off: requires the Rocketlane workspace to allow loading
       * a cross-origin iframe from `https://plansync-tau.vercel.app`.
       * If the workspace's CSP blocks it, the loading state below
       * stays visible so the user has an actionable message instead
       * of a blank screen.
       */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f5f3ff;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          sans-serif;
      }
      iframe {
        display: block;
        border: 0;
        width: 100vw;
        height: 100vh;
      }
      .loading {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: #4c1d95;
        z-index: -1;
      }
      .loading-bolt {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 30px rgba(124, 58, 237, 0.25);
        animation: pulse 2s ease-in-out infinite;
      }
      .loading-bolt svg {
        width: 32px;
        height: 32px;
        fill: white;
      }
      .loading-text {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.05em;
      }
      .loading-sub {
        font-size: 12px;
        color: #6d28d9;
        opacity: 0.7;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.85;
        }
      }
    </style>
  </head>
  <body>
    <div class="loading" aria-hidden="true">
      <div class="loading-bolt">
        <svg viewBox="0 0 24 24">
          <path d="M13 2 L4 14 L11 14 L9 22 L20 8 L13 8 Z" />
        </svg>
      </div>
      <div class="loading-text">Loading Plansync…</div>
      <div class="loading-sub">Connecting to the agent backend</div>
    </div>
    <iframe
      src="https://plansync-tau.vercel.app?embed=1"
      title="Plansync — Rocketlane Project Plan Agent"
      allow="clipboard-read; clipboard-write"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    ></iframe>
  </body>
</html>
